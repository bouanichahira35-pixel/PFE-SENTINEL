services:
  mongo:
    image: mongo:7
    container_name: sentinel-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/pfe_sentinel
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${DOCKER_JWT_SECRET:-sentinel_docker_dev_jwt_secret_32_chars}
      PII_HASH_SECRET: ${DOCKER_PII_HASH_SECRET:-sentinel_docker_dev_pii_secret_32_chars}
      INTERNAL_BOND_QR_SECRET: ${DOCKER_INTERNAL_BOND_QR_SECRET:-sentinel_docker_dev_qr_secret_32_chars}
      SUPPLIER_PORTAL_JWT_SECRET: ${DOCKER_SUPPLIER_PORTAL_JWT_SECRET:-sentinel_docker_supplier_secret_32_chars}
      FRONTEND_URL: http://localhost:8080
      FRONTEND_URLS: http://localhost:8080,http://127.0.0.1:8080
      APP_BASE_URL: http://localhost:8080
      MAIL_QUEUE_ENABLED: ${DOCKER_MAIL_QUEUE_ENABLED:-false}
      MAIL_HOST: ${DOCKER_MAIL_HOST:-}
      MAIL_PORT: ${DOCKER_MAIL_PORT:-587}
      MAIL_SECURE: ${DOCKER_MAIL_SECURE:-false}
      MAIL_USER: ${DOCKER_MAIL_USER:-}
      MAIL_PASS: ${DOCKER_MAIL_PASS:-}
      MAIL_FROM: ${DOCKER_MAIL_FROM:-}
      AI_AUTO_TRAIN_ON_BOOT: "false"
      AI_AUTO_TRAINING_JOB_ENABLED: "false"
      AI_ALERTS_REBUILD_ON_BOOT: "false"
      DOMAIN_CLEANUP_ON_BOOT: "false"
      PO_REMINDERS_JOB_ENABLED: "false"
      AI_PYTHON_BIN: python3
      GEMINI_API_KEY: ${DOCKER_GEMINI_API_KEY:-}
      GROQ_API_KEY: ${DOCKER_GROQ_API_KEY:-}
    volumes:
      - backend_uploads:/app/uploads
      - backend_ai_data:/app/data/ai
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REACT_APP_API_URL: /api
    container_name: sentinel-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mongo_data:
  backend_uploads:
  backend_ai_data:
